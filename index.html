<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
    }

    .box {
        background: linear-gradient(to bottom, #000000, #0a0a0a);
        padding: 30px;
        border-radius: 20px;
        width: 340px;
        text-align: center;
        box-shadow: 0 0 40px rgba(255, 204, 0, 0.15);
    }

    /* Profile Image */
    .profile img {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #ffd700;
        margin-bottom: 15px;
    }

    /* Name */
    .name {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 10px;
    }

    /* Subtitle */
    .subtitle {
        color: #ffd700;
        font-size: 14px;
        margin-bottom: 25px;
    }

    /* Button (BIGGER + PREMIUM) */
    .btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        padding: 16px;
        border-radius: 40px;
        background: linear-gradient(90deg, #ffd700, #ffea70);
        color: black;
        font-weight: 700;
        text-decoration: none;
        font-size: 16px;
        transition: 0.3s;
        margin-bottom: 20px;
    }

    .btn:hover {
        transform: scale(1.03);
    }

    /* Trust Text */
    .trust {
        color: #ffd700;
        font-size: 13px;
        margin-bottom: 8px;
    }

    /* Footer */
    .footer {
        font-size: 11px;
        color: #888;
    }

    .footer a {
        color: #ffd700;
        text-decoration: none;
        font-weight: 500;
    }

</style>
</head>

<body>

<div class="box">
      <!-- Name -->
    <div class="name">RAHUL BHAI ON TOP </div>

    <!-- Profile -->
    <div class="profile">
        <img src="rahul.jpg" alt="Profile">
    </div>



    <!-- Subtitle -->
    <div class="subtitle">Most Demanding Channel</div>

    <!-- Button -->
    <a href="https://t.me/+ktQnEknBZxw3NjY1" class="btn">
        <i class="fa-solid fa-paper-plane"></i> Join Telegram Now
    </a>

    <!-- Trust -->
    <div class="trust">⭐ Trusted by 50,000+ members Across India</div>

    <!-- Footer -->
    <div class="footer">
        100% FREE | NO SPAM | INSTANT UPDATES <br><br>
        Ads managed by <a href="https://t.me/Wishmaster070">GBM</a>
    </div>

</div>

</body>
</html>
